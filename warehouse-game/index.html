<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTG Warehouse Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #34495e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    #game-container {
      background: #2c3e50;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    
    #game-canvas {
      display: block;
      background: #34495e;
      border: 2px solid #ecf0f1;
    }
    
    #loading {
      color: #ecf0f1;
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }
    
    .hidden {
      display: none;
    }
    /* Modal styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

/* Make sure hidden takes priority */
.modal.hidden {
  display: none !important;
}
    .modal-content {
      background: #ecf0f1;
      padding: 40px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }

    .modal-content h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .modal-content p {
      color: #34495e;
      margin-bottom: 20px;
      font-size: 16px;
    }

    #email-form input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #bdc3c7;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    #email-form button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #email-form button:hover {
      background: #229954;
    }

    #coupon-code {
      background: #2c3e50;
      color: #f39c12;
      font-size: 32px;
      font-weight: bold;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }

    .coupon-note {
      color: #e74c3c;
      font-weight: bold;
      font-size: 14px;
    }

    #coupon-details {
      color: #27ae60;
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0;
    }

    #continue-button {
      padding: 12px 30px;
      font-size: 16px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #continue-button:hover {
      background: #2980b9;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
    }

    /* Leaderboard styles */
    #leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    #leaderboard-table th {
      background: #34495e;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: bold;
    }

    #leaderboard-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #bdc3c7;
      color: #2c3e50;
    }

    #leaderboard-table tbody tr:hover {
      background: #ecf0f1;
    }

    #leaderboard-table tbody tr:nth-child(1) td:first-child {
      color: #f39c12;
      font-weight: bold;
      font-size: 18px;
    }

    #leaderboard-table tbody tr:nth-child(2) td:first-child {
      color: #95a5a6;
      font-weight: bold;
      font-size: 16px;
    }

    #leaderboard-table tbody tr:nth-child(3) td:first-child {
      color: #cd7f32;
      font-weight: bold;
      font-size: 16px;
    }

    #close-leaderboard-btn {
      padding: 12px 30px;
      font-size: 16px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    #close-leaderboard-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <div id="game-container">
  <div id="loading">Loading...</div>
  <canvas id="game-canvas" class="hidden"></canvas>
</div>

<!-- Coupon Modal -->
<div id="coupon-modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modal-title">🎉 Level Complete!</h2>
    <p id="modal-message">Enter your email to claim your reward!</p>
    
    <div id="email-form">
      <input type="email" id="email-input" placeholder="your@email.com" />
      <button id="email-submit">Claim Reward</button>
      <p id="email-error" class="error hidden"></p>
    </div>
    
    <div id="coupon-display" class="hidden">
      <p>Your coupon code:</p>
      <div id="coupon-code"></div>
      <p class="coupon-note">⚠️ Save this code! Take a screenshot or write it down.</p>
      <p id="coupon-details"></p>
      <button id="continue-button">Continue Playing</button>
    </div>
  </div>
</div>

 <!-- Leaderboard Modal -->
<div id="leaderboard-modal" class="modal hidden">
  <div class="modal-content" style="max-width: 700px;">
    <div style="text-align: right; margin-bottom: -30px;">
      <button id="close-leaderboard" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #7f8c8d;">&times;</button>
    </div>
    <h2>🏆 Leaderboard - Top 10</h2>
    <div id="leaderboard-loading">Loading...</div>
    <div id="leaderboard-content" class="hidden">
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
            <th>Moves</th>
            <th>Time</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <!-- Filled by JavaScript -->
        </tbody>
      </table>
    </div>
    <button id="close-leaderboard-btn">Close</button>
  </div>
</div> 

<!-- Load scripts -->
<!-- Supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

<script src="js/config.js"></script>
<script src="js/levelManager.js"></script>
<script src="js/coupon.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game.js"></script>
</body>
</html>
