<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RA Tracking System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 20px;
    background: #ffffff;
    color: #111827;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .header {
    background: #000000;
    color: #ffffff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  h1 {
    margin: 0;
    font-size: 1.5rem;
  }

  .back-btn {
    padding: 8px 16px;
    background: #b6282c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .back-btn:hover {
    background: #9b1f24;
  }

  .card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .card h2 {
    margin: 0 0 15px 0;
    font-size: 1.2rem;
    color: #111827;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  label {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 4px;
    color: #374151;
  }

  input[type="text"],
  textarea,
  select {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.9rem;
    background: white;
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: 2px solid #b6282c;
    border-color: #b6282c;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
  }

  .btn-primary {
    padding: 10px 20px;
    background: #b6282c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #9b1f24;
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status-message {
    padding: 12px;
    border-radius: 6px;
    margin-top: 12px;
    font-size: 0.9rem;
    display: none;
  }

  .status-message.success {
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #6ee7b7;
  }

  .status-message.error {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fca5a5;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .search-bar input {
    flex: 1;
  }

  .search-bar select {
    min-width: 150px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    font-size: 0.85rem;
  }

  th {
    background: #f3f4f6;
    padding: 10px;
    text-align: left;
    font-weight: 600;
    color: #374151;
    border-bottom: 2px solid #e5e7eb;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #e5e7eb;
  }

  tr:hover {
    background: #f9fafb;
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  .btn-small {
    padding: 4px 10px;
    font-size: 0.8rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .btn-edit {
    background: #3b82f6;
    color: white;
  }

  .btn-edit:hover {
    background: #2563eb;
  }

  .btn-delete {
    background: #ef4444;
    color: white;
  }

  .btn-delete:hover {
    background: #dc2626;
  }

  .pagination {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
  }

  .pagination button {
    padding: 6px 12px;
    background: #e5e7eb;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .pagination button:hover:not(:disabled) {
    background: #d1d5db;
  }

  .pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .pagination span {
    padding: 6px 12px;
    display: flex;
    align-items: center;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: white;
    padding: 24px;
    border-radius: 12px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-header h2 {
    margin: 0;
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #6b7280;
  }

  .close-btn:hover {
    color: #111827;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn-secondary {
    padding: 10px 20px;
    background: #e5e7eb;
    color: #374151;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95rem;
  }

  .btn-secondary:hover {
    background: #d1d5db;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #6b7280;
  }

  .photo-upload {
    margin-top: 15px;
    padding: 15px;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 8px;
  }

  .photo-upload h3 {
    margin: 0 0 10px 0;
    font-size: 0.95rem;
    color: #374151;
  }

  .photo-input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .photo-input-wrapper input[type="file"] {
    flex: 1;
  }

  .photo-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  .photo-preview-item {
    position: relative;
    width: 80px;
    height: 80px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    overflow: hidden;
  }

  .photo-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 4px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 0;
  }

  .photo-remove:hover {
    background: #dc2626;
  }

  .photo-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .photo-link {
    padding: 4px 8px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 0.75rem;
  }

  .photo-link:hover {
    background: #2563eb;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📦 RA Tracking System</h1>
      <button class="back-btn" onclick="location.href='login.html'">← Back to Menu</button>
    </div>

    <!-- Input Form -->
    <div class="card">
      <h2>Add New RA Item</h2>
      <form id="ra-form">
        <div class="form-row">
          <div class="form-group">
            <label for="customer-name">Customer Name *</label>
            <input type="text" id="customer-name" required />
          </div>
          <div class="form-group">
            <label for="customer-po">Customer PO</label>
            <input type="text" id="customer-po" />
          </div>
          <div class="form-group">
            <label for="job-number">Job Number</label>
            <input type="text" id="job-number" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="location">Location (Rack/Shelf)</label>
            <input type="text" id="location" />
          </div>
          <div class="form-group">
            <label for="authorized-by">Who Said Send to RA</label>
            <input type="text" id="authorized-by" />
          </div>
          <div class="form-group">
            <label for="contents">Contents</label>
            <input type="text" id="contents" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes"></textarea>
          </div>
        </div>

        <div class="photo-upload">
          <h3>📷 Photos (Optional)</h3>
          <div class="photo-input-wrapper">
            <input 
              type="file" 
              id="photo-input" 
              accept="image/*" 
              capture="environment"
              multiple
            />
          </div>
          <div id="photo-preview" class="photo-preview"></div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Add RA Item</button>
        
        <div id="form-status" class="status-message"></div>
      </form>
    </div>

    <!-- Search and Browse -->
    <div class="card">
      <h2>Search RA Items</h2>
      
      <div class="search-bar">
        <select id="search-field">
          <option value="customer_name">Customer Name</option>
          <option value="job_number">Job Number</option>
          <option value="customer_po">Customer PO</option>
          <option value="location">Location</option>
          <option value="contents">Contents</option>
        </select>
        <input type="text" id="search-input" placeholder="Enter search term..." />
        <button class="btn-primary" id="search-btn">Search</button>
        <button class="btn-secondary" id="clear-btn">Clear</button>
      </div>

      <div id="table-container">
        <table id="ra-table">
          <thead>
            <tr>
              <th>Customer Name</th>
              <th>PO</th>
              <th>Job #</th>
              <th>Location</th>
              <th>Contents</th>
              <th>Authorized By</th>
              <th>Date Added</th>
              <th>Photos</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ra-table-body">
            <!-- Data will be populated here -->
          </tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display: none;">
          No RA items found
        </div>
      </div>

      <div class="pagination">
        <button id="prev-btn">← Previous</button>
        <span id="page-info">Page 1</span>
        <button id="next-btn">Next →</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit RA Item</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        
        <div class="form-row">
          <div class="form-group">
            <label for="edit-customer-name">Customer Name *</label>
            <input type="text" id="edit-customer-name" required />
          </div>
          <div class="form-group">
            <label for="edit-customer-po">Customer PO</label>
            <input type="text" id="edit-customer-po" />
          </div>
          <div class="form-group">
            <label for="edit-job-number">Job Number</label>
            <input type="text" id="edit-job-number" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-location">Location</label>
            <input type="text" id="edit-location" />
          </div>
          <div class="form-group">
            <label for="edit-authorized-by">Who Said Send to RA</label>
            <input type="text" id="edit-authorized-by" />
          </div>
          <div class="form-group">
            <label for="edit-contents">Contents</label>
            <input type="text" id="edit-contents" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-notes">Notes</label>
            <textarea id="edit-notes"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.94.1/+esm";

    const SUPABASE_URL = "https://sbfslzwnkztmodnlsigq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZnNsendua3p0bW9kbmxzaWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3OTQ5NTgsImV4cCI6MjA3ODM3MDk1OH0.ebZ1IvA5FQN7EhIcluJvw3OqMFU4Czkhin_ffTPx9vg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Global state
    let currentPage = 1;
    const itemsPerPage = 5;
    let currentSearch = { field: '', term: '' };
    let selectedPhotos = []; // Store File objects for upload

    // Check authentication
    async function checkAuth() {
      const { data, error } = await supabase.auth.getSession();
      if (error || !data.session) {
        window.location.href = 'login.html';
        return null;
      }
      return data.session.user;
    }

    // Photo preview handling
    document.getElementById('photo-input').addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      selectedPhotos = [...selectedPhotos, ...files];
      updatePhotoPreview();
    });

    function updatePhotoPreview() {
      const previewContainer = document.getElementById('photo-preview');
      previewContainer.innerHTML = '';
      
      selectedPhotos.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.className = 'photo-preview-item';
          div.innerHTML = `
            <img src="${e.target.result}" alt="Preview ${index + 1}" />
            <button type="button" class="photo-remove" onclick="removePhoto(${index})">×</button>
          `;
          previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    }

    window.removePhoto = (index) => {
      selectedPhotos.splice(index, 1);
      updatePhotoPreview();
    };

    // Upload photos to Supabase Storage
    async function uploadPhotos(raItemId) {
      const uploadedUrls = [];
      
      for (let i = 0; i < selectedPhotos.length; i++) {
        const file = selectedPhotos[i];
        const fileExt = file.name.split('.').pop();
        const fileName = `${raItemId}_${Date.now()}_${i}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await supabase.storage
          .from('ra-photos')
          .upload(filePath, file);

        if (error) {
          console.error('Error uploading photo:', error);
          continue;
        }

        // Get public URL
        const { data: urlData } = supabase.storage
          .from('ra-photos')
          .getPublicUrl(filePath);

        uploadedUrls.push(urlData.publicUrl);
      }

      return uploadedUrls;
    }

    // Show status message
    function showStatus(message, type) {
      const statusEl = document.getElementById('form-status');
      statusEl.textContent = message;
      statusEl.className = `status-message ${type}`;
      statusEl.style.display = 'block';
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 3000);
    }

    // Load RA items
    async function loadItems() {
      const { data, error } = await supabase
        .from('ra_items')
        .select('*')
        .eq('is_deleted', false)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading items:', error);
        return [];
      }
      return data || [];
    }

    // Filter items based on search
    function filterItems(items) {
      if (!currentSearch.term) return items;
      
      return items.filter(item => {
        const value = item[currentSearch.field] || '';
        return value.toLowerCase().includes(currentSearch.term.toLowerCase());
      });
    }

    // Display items in table
    function displayItems(items) {
      const tbody = document.getElementById('ra-table-body');
      const emptyState = document.getElementById('empty-state');
      const table = document.getElementById('ra-table');
      
      const filteredItems = filterItems(items);
      const startIdx = (currentPage - 1) * itemsPerPage;
      const endIdx = startIdx + itemsPerPage;
      const pageItems = filteredItems.slice(startIdx, endIdx);

      if (pageItems.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = 'block';
      } else {
        table.style.display = 'table';
        emptyState.style.display = 'none';
        
        tbody.innerHTML = pageItems.map(item => {
          const photos = item.photo_urls || [];
          const photoLinks = photos.length > 0 
            ? `<div class="photo-links">${photos.map((url, i) => 
                `<a href="${url}" target="_blank" class="photo-link">Pic ${i + 1}</a>`
              ).join('')}</div>`
            : '-';
          
          return `
          <tr>
            <td>${item.customer_name || ''}</td>
            <td>${item.customer_po || ''}</td>
            <td>${item.job_number || ''}</td>
            <td>${item.location || ''}</td>
            <td>${item.contents || ''}</td>
            <td>${item.authorized_by || ''}</td>
            <td>${new Date(item.created_at).toLocaleDateString()}</td>
            <td>${photoLinks}</td>
            <td class="actions">
              <button class="btn-small btn-edit" onclick="editItem('${item.id}')">Edit</button>
              <button class="btn-small btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
            </td>
          </tr>
        `;
        }).join('');
      }

      // Update pagination
      const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages || 1}`;
      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }

    // Refresh table
    async function refreshTable() {
      const items = await loadItems();
      displayItems(items);
    }

    // Add new RA item
    document.getElementById('ra-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = await checkAuth();
      if (!user) return;

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      try {
        const formData = {
          customer_name: document.getElementById('customer-name').value,
          customer_po: document.getElementById('customer-po').value || null,
          job_number: document.getElementById('job-number').value || null,
          location: document.getElementById('location').value || null,
          authorized_by: document.getElementById('authorized-by').value || null,
          contents: document.getElementById('contents').value || null,
          notes: document.getElementById('notes').value || null,
          created_by: user.id,
          photo_urls: [] // Will update after upload
        };

        // Insert the item first to get the ID
        const { data: newItem, error: insertError } = await supabase
          .from('ra_items')
          .insert([formData])
          .select()
          .single();

        if (insertError) throw insertError;

        // Upload photos if any
        if (selectedPhotos.length > 0) {
          submitBtn.textContent = 'Uploading photos...';
          const photoUrls = await uploadPhotos(newItem.id);
          
          // Update the item with photo URLs
          const { error: updateError } = await supabase
            .from('ra_items')
            .update({ photo_urls: photoUrls })
            .eq('id', newItem.id);

          if (updateError) {
            console.error('Error updating photo URLs:', updateError);
          }
        }

        showStatus('RA item added successfully!', 'success');
        document.getElementById('ra-form').reset();
        selectedPhotos = [];
        updatePhotoPreview();
        refreshTable();
      } catch (error) {
        console.error('Error adding item:', error);
        showStatus('Error adding item: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add RA Item';
      }
    });

    // Search functionality
    document.getElementById('search-btn').addEventListener('click', () => {
      currentSearch = {
        field: document.getElementById('search-field').value,
        term: document.getElementById('search-input').value
      };
      currentPage = 1;
      refreshTable();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      document.getElementById('search-input').value = '';
      currentSearch = { field: '', term: '' };
      currentPage = 1;
      refreshTable();
    });

    // Enter key to search
    document.getElementById('search-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('search-btn').click();
      }
    });

    // Pagination
    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        refreshTable();
      }
    });

    document.getElementById('next-btn').addEventListener('click', async () => {
      const items = await loadItems();
      const filteredItems = filterItems(items);
      const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        refreshTable();
      }
    });

    // Edit item (global function)
    window.editItem = async (id) => {
      const { data, error } = await supabase
        .from('ra_items')
        .select('*')
        .eq('id', id)
        .single();

      if (error || !data) {
        console.error('Error loading item:', error);
        return;
      }

      document.getElementById('edit-id').value = data.id;
      document.getElementById('edit-customer-name').value = data.customer_name || '';
      document.getElementById('edit-customer-po').value = data.customer_po || '';
      document.getElementById('edit-job-number').value = data.job_number || '';
      document.getElementById('edit-location').value = data.location || '';
      document.getElementById('edit-authorized-by').value = data.authorized_by || '';
      document.getElementById('edit-contents').value = data.contents || '';
      document.getElementById('edit-notes').value = data.notes || '';

      document.getElementById('edit-modal').style.display = 'flex';
    };

    // Close edit modal (global function)
    window.closeEditModal = () => {
      document.getElementById('edit-modal').style.display = 'none';
    };

    // Save edit
    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('edit-id').value;
      const updateData = {
        customer_name: document.getElementById('edit-customer-name').value,
        customer_po: document.getElementById('edit-customer-po').value || null,
        job_number: document.getElementById('edit-job-number').value || null,
        location: document.getElementById('edit-location').value || null,
        authorized_by: document.getElementById('edit-authorized-by').value || null,
        contents: document.getElementById('edit-contents').value || null,
        notes: document.getElementById('edit-notes').value || null
      };

      const { error } = await supabase
        .from('ra_items')
        .update(updateData)
        .eq('id', id);

      if (error) {
        console.error('Error updating item:', error);
        alert('Error updating item: ' + error.message);
      } else {
        closeEditModal();
        refreshTable();
      }
    });

    // Delete item (soft delete - global function)
    window.deleteItem = async (id) => {
      if (!confirm('Are you sure you want to delete this RA item?')) {
        return;
      }

      const { error } = await supabase
        .from('ra_items')
        .update({ is_deleted: true })
        .eq('id', id);

      if (error) {
        console.error('Error deleting item:', error);
        alert('Error deleting item: ' + error.message);
      } else {
        refreshTable();
      }
    };

    // Initialize
    checkAuth().then(user => {
      if (user) {
        refreshTable();
      }
    });
  </script>
</body>
</html>
