<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      background-color: #ffffff;
      color: #111;
    }

    h1 {
      color: #b6282c;
      border-bottom: 3px solid #b6282c;
      padding-bottom: 0.3rem;
      margin-bottom: 1.5rem;
    }

    .notice {
      background: #f9fafb;
      border: 1px solid #ccc;
      border-left: 6px solid #b6282c;
      padding: 1rem;
      border-radius: 6px;
      max-width: 600px;
    }

    .notice strong {
      color: #000;
    }

    .top-actions {
      margin-bottom: 1.5rem;
    }

    .btn {
      background: #b6282c;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .btn.secondary {
      background: #000;
    }

    .btn:hover {
      opacity: 0.9;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
        font-size: 13px;
        }

        th, td {
        border: 1px solid #ccc;
        padding: 0.4rem;
        text-align: left;
        }

        th {
        background: #000;
        color: #fff;
        }

        /* Style checkboxes */
        input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
        }

        /* Center align checkbox columns */
        td:nth-child(4),  /* Admin */
        td:nth-child(5),  /* Spectrum */
        td:nth-child(6),  /* Package */
        td:nth-child(7),  /* RA */
        td:nth-child(8) { /* Standard Tools */
        text-align: center;
        }

        th:nth-child(4),  /* Admin */
        th:nth-child(5),  /* Spectrum */
        th:nth-child(6),  /* Package */
        th:nth-child(7),  /* RA */
        th:nth-child(8) { /* Standard Tools */
        text-align: center;
        }

  </style>
</head>

<body>
  <h1>User Management</h1>

  <div class="top-actions">
    <button class="btn secondary" onclick="location.href='/login.html'">
         ← Back to Tools
    </button>
  </div>

  <div id="status" class="notice">
    <strong>Checking permissions…</strong>
  </div>

    <h2 style="margin-top:2rem;">Add User</h2>

    <div style="margin-bottom:1.5rem;">
    <input
        id="new-email"
        type="email"
        placeholder="email@hightechgrafix.com"
        style="padding:6px; width:260px; margin-right:0.5rem;"
    />

    <input
        id="new-password"
        type="text"
        placeholder="Temporary password"
        style="padding:6px; width:200px; margin-right:0.5rem;"
    />

    <button class="btn" id="add-user-btn">
        Add User
    </button>
    </div>


  <table id="users-table" style="display:none; margin-top:2rem;">
    <thead>
    <tr>
        <th>Email</th>
        <th>Created</th>
        <th>Last Sign-in</th>
        <th>Admin</th>
        <th>Spectrum</th>
        <th>Package Tracker</th>
        <th>RA Tracking</th>
        <th>Standard Tools</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody></tbody>
  </table>


  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // ===== Supabase config (SAME as your other pages) =====
    const SUPABASE_URL = "https://sbfslzwnkztmodnlsigq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZnNsendua3p0bW9kbmxzaWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3OTQ5NTgsImV4cCI6MjA3ODM3MDk1OH0.ebZ1IvA5FQN7EhIcluJvw3OqMFU4Czkhin_ffTPx9vg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const statusEl = document.getElementById("status");

    function setStatus(html) {
      statusEl.innerHTML = html;
    }

    async function init() {
      // 1️⃣ Must be logged in
      const { data: sessionData } = await supabase.auth.getSession();
      const session = sessionData?.session;

      if (!session) {
        location.href = "/";
        return;
      }

      const userId = session.user.id;
      const email = session.user.email;

      // 2️⃣ Check admin permissions via new user_management table
      const { data: userPermissions, error: permissionError } = await supabase
        .from("user_management")
        .select("is_admin")
        .eq("user_id", userId)
        .single();
      
      // If no permissions record exists, check old admins table for backward compatibility
      let isAdmin = false;
      if (permissionError && permissionError.code === 'PGRST116') {
        // No record in user_management, check old admins table as fallback
        const { data: adminRow } = await supabase
          .from("admins")
          .select("id")
          .eq("id", userId)
          .single();
        isAdmin = !!adminRow;
      } else if (!permissionError && userPermissions) {
        // Check new permission system
        isAdmin = userPermissions.is_admin;
      }

      if (!isAdmin) {
        location.href = "/";
        return;
      }

      // ✅ Admin confirmed
      setStatus(`
        <strong>Admin access confirmed.</strong><br />
        Logged in as <code>${email}</code><br /><br />
        <strong>New:</strong> Use the checkboxes below to control which buttons each user can see on the main login page.<br />
        Changes are saved automatically when you click a checkbox.
      `);

      loadUsers(session);

    }
    async function loadUsers(session) {
        const token = session.access_token;

        // Load users from Supabase Auth
        const res = await fetch("/api/admin/list-users", {
            headers: {
            Authorization: `Bearer ${token}`,
            },
        });

        if (!res.ok) {
            document.getElementById("status").innerHTML =
            "<strong>Error loading users.</strong>";
            return;
        }

        const { users } = await res.json();

        // Load user management permissions
        const { data: userManagement, error } = await supabase
            .from('user_management')
            .select('*');

        const tbody = document.querySelector("#users-table tbody");
        tbody.innerHTML = "";

        users.forEach((u) => {
            // Find permissions for this user
            const permissions = userManagement?.find(um => um.user_id === u.id) || {
                is_admin: false,
                has_spectrum_access: false,
                has_package_access: true, // Default true
                has_ra_access: false,
                has_standard_tools: true // Default true
            };

            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${u.email || ""}</td>
            <td>${u.created_at ? new Date(u.created_at).toLocaleString() : ""}</td>
            <td>${u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleString() : "—"}</td>
            <td><input type="checkbox" ${permissions.is_admin ? 'checked' : ''} data-permission="is_admin" data-user-id="${u.id}"></td>
            <td><input type="checkbox" ${permissions.has_spectrum_access ? 'checked' : ''} data-permission="has_spectrum_access" data-user-id="${u.id}"></td>
            <td><input type="checkbox" ${permissions.has_package_access ? 'checked' : ''} data-permission="has_package_access" data-user-id="${u.id}"></td>
            <td><input type="checkbox" ${permissions.has_ra_access ? 'checked' : ''} data-permission="has_ra_access" data-user-id="${u.id}"></td>
            <td><input type="checkbox" ${permissions.has_standard_tools ? 'checked' : ''} data-permission="has_standard_tools" data-user-id="${u.id}"></td>
            <td>
                <button
                    class="btn"
                    style="background:#444; padding:4px 8px; font-size:12px; margin-right:4px;"
                    data-action="reset"
                >
                    Reset Password
                </button>

                <button
                    class="btn"
                    style="background:#000; padding:4px 8px; font-size:12px;"
                    data-action="delete"
                >
                    Delete
                </button>
                </td>
            `;
            tbody.appendChild(tr);
            
            // Add event listeners for buttons
            const buttons = tr.querySelectorAll("button");
            buttons.forEach((btn) => {
                const action = btn.dataset.action;

                if (action === "delete") {
                    btn.addEventListener("click", () => deleteUser(u.id, u.email));
                }

                if (action === "reset") {
                    btn.addEventListener("click", () => resetPassword(u.email));
                }
            });

            // Add event listeners for checkboxes
            const checkboxes = tr.querySelectorAll("input[type='checkbox']");
            checkboxes.forEach((checkbox) => {
                checkbox.addEventListener("change", (e) => {
                    updateUserPermissions(e.target.dataset.userId, e.target.dataset.permission, e.target.checked);
                });
            });
        });

        document.getElementById("users-table").style.display = "table";
    }

    async function deleteUser(userId, userEmail) {
    const { data: sessionData } = await supabase.auth.getSession();
    const session = sessionData?.session;

    if (!session) {
        alert("Session expired. Please log in again.");
        location.href = "/login.html";
        return;
    }

    // Guardrail: prevent deleting yourself
    if (session.user.id === userId) {
        alert("You cannot delete your own account.");
        return;
    }

    const confirmed = confirm(
        `Are you sure you want to delete:\n\n${userEmail}?`
    );

    if (!confirmed) return;

    const res = await fetch("/api/admin/delete-user", {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ userId }),
    });

    const result = await res.json();

    if (!res.ok) {
        alert(result.error || "Failed to delete user");
        return;
    }

    loadUsers(session);
    }
    async function updateUserPermissions(userId, permission, isEnabled) {
        try {
            // First check if user already has a record in user_management
            const { data: existingRecord, error: fetchError } = await supabase
                .from('user_management')
                .select('*')
                .eq('user_id', userId)
                .single();

            const updateData = {
                user_id: userId,
                [permission]: isEnabled
            };

            if (fetchError && fetchError.code === 'PGRST116') {
                // No record exists, create one
                const { error: insertError } = await supabase
                    .from('user_management')
                    .insert({
                        user_id: userId,
                        is_admin: permission === 'is_admin' ? isEnabled : false,
                        has_spectrum_access: permission === 'has_spectrum_access' ? isEnabled : false,
                        has_package_access: permission === 'has_package_access' ? isEnabled : true,
                        has_ra_access: permission === 'has_ra_access' ? isEnabled : false,
                        has_standard_tools: permission === 'has_standard_tools' ? isEnabled : true
                    });

                if (insertError) {
                    console.error('Error creating user permissions:', insertError);
                    alert('Error updating permissions');
                }
            } else if (!fetchError) {
                // Record exists, update it
                const { error: updateError } = await supabase
                    .from('user_management')
                    .update({ [permission]: isEnabled })
                    .eq('user_id', userId);

                if (updateError) {
                    console.error('Error updating user permissions:', updateError);
                    alert('Error updating permissions');
                }
            } else {
                console.error('Error fetching user permissions:', fetchError);
                alert('Error updating permissions');
            }
        } catch (err) {
            console.error('Unexpected error:', err);
            alert('Error updating permissions');
        }
    }

    async function resetPassword(email) {
    const confirmed = confirm(
        `Send password reset email to:\n\n${email}?`
    );

    if (!confirmed) return;

    const { data: sessionData } = await supabase.auth.getSession();
    const session = sessionData?.session;

    if (!session) {
        alert("Session expired. Please log in again.");
        location.href = "/login.html";
        return;
    }

    const res = await fetch("/api/admin/send-reset", {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ email }),
    });

    const result = await res.json();

    if (!res.ok) {
        alert(result.error || "Failed to send reset email");
        return;
    }

    alert("Password reset email sent.");
    }


    document.getElementById("add-user-btn").addEventListener("click", async () => {
    const email = document.getElementById("new-email").value.trim();
    const password = document.getElementById("new-password").value.trim();

    if (!email || !password) {
        alert("Email and password are required.");
        return;
    }

    const { data: sessionData } = await supabase.auth.getSession();
    const session = sessionData?.session;

    if (!session) {
        alert("Session expired. Please log in again.");
        location.href = "/login.html";
        return;
    }

    const res = await fetch("/api/admin/create-user", {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ email, password }),
    });

    const result = await res.json();

    if (!res.ok) {
        alert(result.error || "Failed to create user");
        return;
    }

    // Create default permissions for the new user
    if (result.user && result.user.id) {
        const { error: permissionError } = await supabase
            .from('user_management')
            .insert({
                user_id: result.user.id,
                is_admin: false,
                has_spectrum_access: false,
                has_package_access: true,
                has_ra_access: false,
                has_standard_tools: true
            });

        if (permissionError) {
            console.error('Error creating default permissions:', permissionError);
            // Don't alert here since the user was created successfully
        }
    }

    document.getElementById("new-email").value = "";
    document.getElementById("new-password").value = "";

    // Refresh table
    loadUsers(session);
    });

    init();
  </script>
</body>
</html>
