<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HTG Team Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    padding-top: 40px;
    justify-content: center;
    background: #ffffff;
    color: #111827;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .card {
    background: #000000;
    color: #ffffff;
    border-radius: 12px;
    padding: 24px 20px 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    border: 1px solid #333;
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 0.5rem;
    text-align: center;
    color: #ffffff;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #9ca3af;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.85rem;
    margin-bottom: 0.25rem;
    color: #ffffff;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border-radius: 8px;
    border: 1px solid #9ca3af;
    background: #111;
    color: #ffffff;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  input::placeholder {
    color: #e5e5e5;
    opacity: 1;
  }

  input:focus {
    outline: 2px solid #b6282c;
    border-color: #b6282c;
  }

  button[type="submit"] {
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 0.7rem;
    background: #b6282c;
    color: #ffffff;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.25rem;
  }

  button[type="submit"]:hover {
    background: #9b1f24;
  }

  button[type="submit"]:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .status {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    min-height: 1.1rem;
    text-align: center;
    color: #ffffff;
  }

  .status.error {
    color: #ff6b6b;
  }

  .status.success {
    color: #ffffff;
  }

  .menu-btn {
    width: 100%;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
    border: none;
    border-radius: 8px;
    background: #b6282c;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .menu-btn:hover {
    background: #9b1f24;
  }

  .menu-btn.logout {
    background: #b6282c;
    color: #fff;
  }

  .menu-btn.logout:hover {
    background: #9b1f24;
  }

  #menu {
    background: #000;
    color: #fff;
    padding: 24px;
    border-radius: 16px;
  }

  .menu-title {
    color: #fff !important;
    font-size: 1.1rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>HTG Team Login</h1>
      <p class="subtitle">For internal use only</p>

      <!-- Floater Employee Section (shown before login) -->
      <div id="floater-employee-section" style="text-align: center; padding: 20px 0; border-bottom: 2px solid #333; margin-bottom: 20px;">
        <h2 style="color: #fff; font-size: 1.1rem; margin: 0 0 10px 0;">📅 Floater Employees</h2>
        <p style="color: #9ca3af; font-size: 0.85rem; margin-bottom: 15px;">Check your daily schedule</p>
        
        <!-- QR Code Placeholder -->
        <div style="margin-bottom: 15px;">
          <img id="floater-qr" src="floater_qr.png" alt="Scan QR Code" style="width: 150px; height: 150px; display: block; margin: 0 auto; background: white; padding: 10px; border-radius: 8px;">
          <p style="color: #6b7280; font-size: 0.75rem; margin-top: 8px;">Scan to open on your phone</p>
        </div>
        
        <!-- Or click link -->
        <a href="floater-schedule.html" style="display: inline-block; padding: 12px 24px; background: #b6282c; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem;">
          Open Floater Schedule
        </a>
      </div>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button id="submit-btn" type="submit">Log in</button>
      </form>

      <p id="status" class="status"></p>

      <!-- Menu shown AFTER login -->
      <div id="menu" style="display: none; text-align: center; margin-top: 1.5rem;">
        <h2 class="menu-title">HTG Tools Menu</h2>
        
        <!-- Spectrum Inventory button - shown to spectrum_users -->
        <button
          class="menu-btn"
          id="spectrum-btn"
          style="display:none;"
          onclick="location.href='spectrum_dashboard.html'"
        >
          📦 Spectrum Inventory
        </button>

        <!-- Package Tracker button - shown to package_users -->
        <button
          class="menu-btn"
          id="package-btn"
          style="display:none;"
          onclick="location.href='package-tracker.html'"
        >
          📦 Package Tracker
        </button>

        <!-- RA Tracking button - shown to admins and ra_users -->
        <button
          class="menu-btn"
          id="ra-btn"
          style="display:none;"
          onclick="location.href='ra-tracking.html'"
        >
          📦 RA Tracking
        </button>

        <!-- Replacement Parts button - shown to admins only -->
        <button
          class="menu-btn"
          id="parts-btn"
          style="display:none;"
          onclick="location.href='replacement-parts.html'"
        >
          🔧 Replacement Parts
        </button>

        <!-- Floater Schedule Manager button - shown to admins and floater_schedule users -->
        <button
          class="menu-btn"
          id="floater-schedule-btn"
          style="display:none;"
          onclick="location.href='floater-schedule-manager.html'"
        >
          📅 Floater Schedule Manager
        </button>

        <!-- Original buttons - shown to everyone except receiving-only users -->
        <div id="standard-tools">
          <button class="menu-btn" onclick="location.href='edit-production-times.html'">Edit Production Times</button>  
          <button class="menu-btn" onclick="location.href='add-item.html'">Add Item</button>
          <button class="menu-btn" onclick="location.href='item-lookup.html'">Item Lookup</button>
          <button class="menu-btn" onclick="location.href='shipping-calc.html'">Shipping Calculator</button>
          <button class="menu-btn" onclick="location.href='warehouse-game/admin.html'">🎮 Coupon Management</button>
        </div>

        <!-- ADMIN ONLY -->
        <button
          class="menu-btn"
          id="users-btn"
          style="display:none;"
          onclick="location.href='admin-users.html'"
        >
          User Management
        </button>

        <button class="menu-btn logout" id="logout-btn" style="margin-top: 2rem;">Log Out</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.94.1/+esm";

    const SUPABASE_URL = "https://sbfslzwnkztmodnlsigq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZnNsendua3p0bW9kbmxzaWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3OTQ5NTgsImV4cCI6MjA3ODM3MDk1OH0.ebZ1IvA5FQN7EhIcluJvw3OqMFU4Czkhin_ffTPx9vg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("login-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Signing in..." : "Log in";
    }

    async function checkExistingSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) {
        console.error(error);
        return;
      }
      if (data.session) {
        handleLoggedIn(data.session);
      }
    }

    async function handleLoggedIn(session) {
      const user = session.user;
      const email = user?.email || "";

      setStatus("Logged in as " + email, "success");

      // Hide login form and floater employee section
      document.getElementById("login-form").style.display = "none";
      document.getElementById("floater-employee-section").style.display = "none";

      // Show menu
      document.getElementById("menu").style.display = "block";

      // Get user permissions from unified user_management table
      const { data: userPermissions, error: permissionError } = await supabase
        .from("user_management")
        .select("*")
        .eq("user_id", user.id)
        .single();

      // If no permissions record exists, create default permissions
      if (permissionError && permissionError.code === 'PGRST116') {
        // Create default permissions for existing user
        const { error: insertError } = await supabase
          .from('user_management')
          .insert({
            user_id: user.id,
            is_admin: false,
            has_spectrum_access: false,
            has_package_access: true,
            has_ra_access: false,
            has_standard_tools: true
          });

        if (insertError) {
          console.error('Error creating default permissions:', insertError);
        }

        // Set default permissions for this session
        userPermissions = {
          is_admin: false,
          has_spectrum_access: false,
          has_package_access: true,
          has_ra_access: false,
          has_standard_tools: true
        };
      }

      const permissions = userPermissions || {
        is_admin: false,
        has_spectrum_access: false,
        has_package_access: true,
        has_ra_access: false,
        has_standard_tools: true
      };

      // Show/hide buttons based on permissions
      if (permissions.is_admin) {
        document.getElementById("users-btn").style.display = "block";
        document.getElementById("parts-btn").style.display = "block";
      }

      if (permissions.has_floater_schedule_access || permissions.is_admin) {
        document.getElementById("floater-schedule-btn").style.display = "block";
      }

      if (permissions.has_spectrum_access) {
        document.getElementById("spectrum-btn").style.display = "block";
        
        // If user is spectrum-only (not admin), hide standard tools unless they have explicit access
        if (!permissions.is_admin && !permissions.has_standard_tools) {
          document.getElementById("standard-tools").style.display = "none";
        }
      }

      if (permissions.has_ra_access) {
        document.getElementById("ra-btn").style.display = "block";
      }

      if (permissions.has_package_access) {
        document.getElementById("package-btn").style.display = "block";
      }

      // Show/hide standard tools based on permissions
      if (!permissions.has_standard_tools) {
        document.getElementById("standard-tools").style.display = "none";
      }

      // Logout
      document.getElementById("logout-btn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        location.reload();
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("", "");
      setLoading(true);

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password,
      });

      setLoading(false);

      if (error) {
        console.error("Login error:", error);
        setStatus(error.message || "Login failed", "error");
        return;
      }

      if (!data.session) {
        setStatus("Login failed: no session returned", "error");
        return;
      }

      handleLoggedIn(data.session);
    });

    checkExistingSession();
  </script>
</body>
</html>
