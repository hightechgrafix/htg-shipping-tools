<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HTG Team Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    padding: 20px;
    justify-content: center;
    background: #ffffff;
    color: #111827;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    padding: 16px;
  }

  .card {
    background: #f5f5f5;
    color: #111827;
    border-radius: 12px;
    padding: 24px 20px 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    border: 1px solid #e0e0e0;
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 0.5rem;
    text-align: center;
    color: #111827;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #9ca3af;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.85rem;
    margin-bottom: 0.25rem;
    color: #111827;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border-radius: 8px;
    border: 1px solid #9ca3af;
    background: #111;
    color: #ffffff;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  input::placeholder {
    color: #e5e5e5;
    opacity: 1;
  }

  input:focus {
    outline: 2px solid #b6282c;
    border-color: #b6282c;
  }

  button[type="submit"] {
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 0.7rem;
    background: #b6282c;
    color: #ffffff;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 0.25rem;
  }

  button[type="submit"]:hover {
    background: #9b1f24;
  }

  button[type="submit"]:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .status {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    min-height: 1.1rem;
    text-align: center;
    color: #111827;
  }

  .status.error {
    color: #ff6b6b;
  }

  .status.success {
    color: #059669;
  }

  /* Floater Employee Section */
  #floater-employee-section {
    text-align: center;
    padding: 20px 0;
    border-bottom: 2px solid #d0d0d0;
    margin-bottom: 20px;
  }

  #floater-employee-section h2 {
    color: #111827;
    font-size: 1.1rem;
    margin: 0 0 10px 0;
  }

  #floater-employee-section p {
    color: #6b7280;
    font-size: 0.85rem;
    margin-bottom: 15px;
  }

  #floater-qr {
    width: 150px;
    height: 150px;
    display: block;
    margin: 0 auto 8px;
    background: white;
    padding: 10px;
    border-radius: 8px;
  }

  #floater-employee-section a {
    display: inline-block;
    padding: 12px 24px;
    background: #b6282c;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.95rem;
  }

  #floater-employee-section a:hover {
    background: #9b1f24;
  }

  /* Menu Container - switches to wide layout after login */
  .menu-container {
    display: none;
    margin-top: 1.5rem;
  }

  .menu-container.active {
    display: block;
  }

  /* Switch to wide layout */
  .wrapper.logged-in {
    max-width: 1400px;
  }

  .menu-header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #d0d0d0;
  }

  .menu-header h2 {
    color: #111827;
    font-size: 1.5rem;
    margin: 0;
  }

  /* Grid Layout for Sections */
  .sections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 400px));
    gap: 1.5rem;
    margin-bottom: 2rem;
    justify-content: center;
  }

  .tool-section {
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
  }

  .tool-section h3 {
    color: #b6282c;
    font-size: 1rem;
    margin: 0 0 1rem 0;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-icon {
    font-size: 1.2rem;
  }

  .menu-btn {
    width: 100%;
    padding: 0.65rem 0.75rem;
    margin-bottom: 0.5rem;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    border: 1px solid #2a2a2a;
    transition: all 0.2s;
  }

  .menu-btn:hover {
    background: #b6282c;
    border-color: #b6282c;
    transform: translateY(-1px);
  }

  .menu-btn:last-child {
    margin-bottom: 0;
  }

  /* Logout button - full width at bottom */
  .logout-container {
    text-align: center;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 2px solid #d0d0d0;
  }

  .menu-btn.logout {
    background: #b6282c;
    color: #fff;
    max-width: 300px;
    margin: 0 auto;
    text-align: center;
    font-weight: 600;
    padding: 0.75rem;
  }

  .menu-btn.logout:hover {
    background: #9b1f24;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    body {
      padding: 10px;
    }

    .sections-grid {
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .tool-section {
      padding: 1rem;
    }
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>HTG Team Login</h1>
      <p class="subtitle">For internal use only</p>

      <!-- Floater Employee Section (shown before login) -->
      <div id="floater-employee-section">
        <h2>📅 Floater Employees</h2>
        <p>Check your daily schedule</p>
        
        <div style="margin-bottom: 15px;">
          <img id="floater-qr" src="floater_qr.png" alt="Scan QR Code">
          <p style="color: #6b7280; font-size: 0.75rem; margin-top: 8px;">Scan to open on your phone</p>
        </div>
        
        <a href="floater-schedule.html">Open Floater Schedule</a>
      </div>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button id="submit-btn" type="submit">Log in</button>
      </form>

      <p id="status" class="status"></p>

      <!-- Menu shown AFTER login -->
      <div id="menu" class="menu-container">
        <div class="menu-header">
          <h2>HTG Tools</h2>
        </div>

        <div class="sections-grid" id="sections-grid">
          <!-- Sections will be dynamically inserted here -->
        </div>

        <div class="logout-container">
          <button class="menu-btn logout" id="logout-btn">Log Out</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.94.1/+esm";

    const SUPABASE_URL = "https://sbfslzwnkztmodnlsigq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZnNsendua3p0bW9kbmxzaWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3OTQ5NTgsImV4cCI6MjA3ODM3MDk1OH0.ebZ1IvA5FQN7EhIcluJvw3OqMFU4Czkhin_ffTPx9vg";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("login-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Signing in..." : "Log in";
    }

    function createSection(title, icon, buttons) {
      if (buttons.length === 0) return null;

      const section = document.createElement('div');
      section.className = 'tool-section';
      
      section.innerHTML = `
        <h3><span class="section-icon">${icon}</span>${title}</h3>
      `;

      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.className = 'menu-btn';
        button.textContent = btn.label;
        button.onclick = () => location.href = btn.href;
        section.appendChild(button);
      });

      return section;
    }

    async function checkExistingSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) {
        console.error(error);
        return;
      }
      if (data.session) {
        handleLoggedIn(data.session);
      }
    }

    async function handleLoggedIn(session) {
      const user = session.user;
      const email = user?.email || "";

      setStatus("Logged in as " + email, "success");

      // Hide login form and floater employee section
      document.getElementById("login-form").style.display = "none";
      document.getElementById("floater-employee-section").style.display = "none";

      // Expand wrapper and show menu
      document.querySelector('.wrapper').classList.add('logged-in');
      document.getElementById("menu").classList.add('active');

      // Get user permissions from unified user_management table
      const { data: userPermissions, error: permissionError } = await supabase
        .from("user_management")
        .select("*")
        .eq("user_id", user.id)
        .single();

      // If no permissions record exists, create default permissions
      let permissions = userPermissions;
      if (permissionError && permissionError.code === 'PGRST116') {
        const { error: insertError } = await supabase
          .from('user_management')
          .insert({
            user_id: user.id,
            is_admin: false,
            has_spectrum_access: false,
            has_package_access: true,
            has_ra_access: false,
            has_standard_tools: true
          });

        if (insertError) {
          console.error('Error creating default permissions:', insertError);
        }

        permissions = {
          is_admin: false,
          has_spectrum_access: false,
          has_package_access: true,
          has_ra_access: false,
          has_standard_tools: true
        };
      }

      permissions = permissions || {
        is_admin: false,
        has_spectrum_access: false,
        has_package_access: true,
        has_ra_access: false,
        has_standard_tools: true
      };

      // Build sections based on permissions
      const sectionsGrid = document.getElementById('sections-grid');
      
      // Warehouse & Inventory Section
      const warehouseButtons = [];
      if (permissions.has_spectrum_access) {
        warehouseButtons.push({ label: '📦 Spectrum Inventory', href: 'spectrum_dashboard.html' });
      }
      if (permissions.has_package_access) {
        warehouseButtons.push({ label: '📦 Package Tracker', href: 'package-tracker.html' });
        warehouseButtons.push({ label: '📦 IDK Orphaned Inventory', href: 'idk_orphaned-inventory.html' });
      }
      if (permissions.has_ra_access || permissions.is_admin) {
        warehouseButtons.push({ label: '📦 RA Tracking', href: 'ra-tracking.html' });
      }
      const warehouseSection = createSection('Warehouse & Inventory', '🏭', warehouseButtons);
      if (warehouseSection) sectionsGrid.appendChild(warehouseSection);

      // Production & Items Section
      const productionButtons = [];
      if (permissions.has_standard_tools || permissions.is_admin) {
        productionButtons.push({ label: '💰 Quote Calculator', href: 'pricing-calc-quote-calculator.html' });
        productionButtons.push({ label: 'Edit Production Times', href: 'edit-production-times.html' });
        productionButtons.push({ label: 'Add Item', href: 'add-item.html' });
        productionButtons.push({ label: 'Item Lookup', href: 'item-lookup.html' });
        productionButtons.push({ label: 'Shipping Calculator', href: 'shipping-calc.html' });
      }
      const productionSection = createSection('Production & Items', '⚙️', productionButtons);
      if (productionSection) sectionsGrid.appendChild(productionSection);

      // Specialized Tools Section
      const specializedButtons = [];
      if (permissions.is_admin) {
        specializedButtons.push({ label: '🔧 Replacement Parts', href: 'replacement-parts.html' });
      }
      if (permissions.has_floater_schedule_access || permissions.is_admin) {
        specializedButtons.push({ label: '📅 Floater Schedule Manager', href: 'floater-schedule-manager.html' });
      }
      const specializedSection = createSection('Specialized Tools', '🛠️', specializedButtons);
      if (specializedSection) sectionsGrid.appendChild(specializedSection);

      // Admin & Management Section
      const adminButtons = [];
      if (permissions.is_admin || permissions.has_standard_tools) {
        adminButtons.push({ label: '🎮 Coupon Management', href: 'warehouse-game/admin.html' });
      }
      if (permissions.is_admin) {
        adminButtons.push({ label: '📊 HelpScout Reporting', href: 'helpscout-dashboard.html' });
        adminButtons.push({ label: 'User Management', href: 'admin-users.html' });
      }
      const adminSection = createSection('Admin & Management', '👤', adminButtons);
      if (adminSection) sectionsGrid.appendChild(adminSection);

      // Logout
      document.getElementById("logout-btn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        location.reload();
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("", "");
      setLoading(true);

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password,
      });

      setLoading(false);

      if (error) {
        console.error("Login error:", error);
        setStatus(error.message || "Login failed", "error");
        return;
      }

      if (!data.session) {
        setStatus("Login failed: no session returned", "error");
        return;
      }

      handleLoggedIn(data.session);
    });

    checkExistingSession();
  </script>
</body>
</html>
